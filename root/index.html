<!DOCTYPE html>
<html>
<head>
  <title>FAIZU AI PRO</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }
    h1 {
      margin-top: 20px;
    }
    #chatbox {
      width: 90%;
      max-width: 500px;
      margin: 20px auto;
      background: #1c1c1c;
      padding: 15px;
      border-radius: 10px;
      height: 300px;
      overflow-y: auto;
      text-align: left;
    }
    input {
      width: 65%;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }
    button {
      padding: 10px 15px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      background: #00ff99;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>FAIZU AI PRO</h1>

<div id="chatbox"></div>

<input type="text" id="userInput" placeholder="Type your message...">
<button onclick="sendMessage()">Send</button>

<script>
function sendMessage() {
  let input = document.getElementById("userInput");
  let chatbox = document.getElementById("chatbox");

  let userText = input.value;
  if (!userText) return;

  chatbox.innerHTML += "<p><b>You:</b> " + userText + "</p>";
  input.value = "";

  chatbox.innerHTML += "<p><b>AI:</b> Coming soon...</p>";
}
</script>

</body>
</html>
